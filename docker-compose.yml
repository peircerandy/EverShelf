services:
  evershelf:
    build: .
    container_name: evershelf
    ports:
      - "8000:80/tcp"
    # env_file: stack.env
    # command: sh -c "cp /stack.env /var/www/html/.env && apache2-foreground"
    configs:
      - source: evershelf_env
        target: /var/www/html/.env
    volumes:
      # Persist database and runtime data
      - evershelf_data:/var/www/html/data
      # Mount your local .env configuration
      # - ./.env:/var/www/html/.env:ro
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - APP_ENV=local
      - DEVELOPMENT=true



volumes:
  evershelf_data:
    driver: local
