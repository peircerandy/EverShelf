services:
  evershelf:
    build: .
    container_name: evershelf
    ports:
      - "8000:443"
    volumes:
      # Mount your local .env configuration
      - ./.env:/var/www/html/stack.env
      # Persist database and runtime data
      - evershelf_data:/var/www/html/data
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - APP_ENV=production
      - DB_CONNECTION=sqlite
      - APP_KEY=base64:KeepItSecretKeepItSafe=
      - APP_URL=https://homeassistant.local:8000
      - FORCE_HTTPS=true


volumes:
  evershelf_data:
    driver: local
