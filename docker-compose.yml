services:
  evershelf:
    build: .
    container_name: evershelf
    ports:
      - "8000:80"
    volumes:
      # Persist database and runtime data
      - evershelf_data:/var/www/html/data
      # Mount your local .env configuration
      # - ./.env:/var/www/html/stack.env
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - APP_ENV=production
      - DB_CONNECTION=sqlite
      - APP_KEY=base64:KeepItSecretKeepItSafe=
      - FORCE_HTTPS=false



volumes:
  evershelf_data:
    driver: local
